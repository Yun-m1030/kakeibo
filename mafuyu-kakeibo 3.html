<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まふゆの家計簿</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #F7F4F0;
    --surface: rgba(255,255,255,0.88);
    --surface-solid: #FFFFFF;
    --accent: #C9A98A;
    --accent-light: #EDE3D8;
    --text: #2C2825;
    --text-sub: #8A837C;
    --income: #6BA38A;
    --expense: #C97B7B;
    --border: rgba(200,190,180,0.5);
    --shadow: 0 2px 14px rgba(44,40,37,0.09);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    transition: background 0.3s;
  }

  body.has-bg-image {
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  /* overlay when image bg */
  body.has-bg-image::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(0px);
    z-index: 0;
    pointer-events: none;
  }
  body.has-bg-image > * { position: relative; z-index: 1; }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    backdrop-filter: blur(0px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .header-title span { color: var(--accent); }

  /* ===== BG PICKER ===== */
  .bg-picker {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .bg-picker label { font-size: 10px; color: var(--text-sub); }
  .bg-swatch {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .bg-swatch:hover { transform: scale(1.2); }
  .bg-swatch.active { border-color: var(--accent); }
  .bg-photo-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: linear-gradient(135deg,#f9c,#fc9,#9cf);
    cursor: pointer;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .bg-photo-btn:hover { transform: scale(1.2); }
  .bg-photo-btn.active { border-color: var(--accent); }
  #bgFileInput { display: none; }

  /* ===== NAV TABS ===== */
  .tabs {
    display: flex;
    background: var(--surface);
    backdrop-filter: blur(0px);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 11px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ===== MAIN ===== */
  main { padding: 16px; max-width: 680px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  /* ===== CARDS ===== */
  .card {
    background: var(--surface);
    backdrop-filter: blur(0px);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    margin-bottom: 12px;
  }

  /* ===== SUMMARY GRID ===== */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .summary-item {
    background: var(--surface);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .summary-item.full { grid-column: 1 / -1; }
  .summary-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
  .summary-value { font-size: 22px; font-weight: 700; }
  .summary-value.income { color: var(--income); }
  .summary-value.expense { color: var(--expense); }
  .summary-value.balance { color: var(--text); }

  /* ===== GOAL BAR ===== */
  .goal-section { margin-top: 8px; }
  .goal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; color: var(--text-sub); }
  .goal-bar-bg { background: var(--accent-light); border-radius: 99px; height: 8px; overflow: hidden; }
  .goal-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
  .goal-bar-fill.over { background: var(--expense); }

  /* ===== MONTH NAV ===== */
  .month-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 14px; }
  .month-nav button {
    background: var(--surface);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 30px; height: 30px;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .month-nav button:hover { background: var(--accent-light); }
  .month-nav .month-label { font-size: 16px; font-weight: 700; min-width: 100px; text-align: center; }

  /* ===== CALENDAR ===== */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-header {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-sub);
    padding: 4px 0;
  }
  .cal-header.sun { color: #C97B7B; }
  .cal-header.sat { color: #7B9EC9; }
  .cal-cell {
    border-radius: 8px;
    padding: 4px 3px;
    min-height: 56px;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .cal-cell:hover { background: var(--accent-light); }
  .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-cell.today { border-color: var(--accent); background: rgba(201,169,138,0.12); }
  .cal-day {
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    width: 100%;
    text-align: center;
  }
  .cal-day.sun { color: #C97B7B; }
  .cal-day.sat { color: #7B9EC9; }
  .cal-expense {
    font-size: 9px;
    color: var(--expense);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    word-break: break-all;
  }
  .cal-income {
    font-size: 9px;
    color: var(--income);
    font-weight: 500;
    text-align: center;
    line-height: 1.2;
  }
  .cal-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* ===== DAY DETAIL MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(44,40,37,0.45);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface-solid);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 680px;
    max-height: 70vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close {
    background: var(--accent-light); border: none; border-radius: 50%;
    width: 28px; height: 28px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== FORM ===== */
  .form-grid { display: grid; gap: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: var(--text-sub); font-weight: 500; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: rgba(247,244,240,0.8);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .type-toggle {
    display: grid; grid-template-columns: 1fr 1fr;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .type-btn {
    padding: 10px; text-align: center; cursor: pointer;
    font-size: 13px; font-weight: 500;
    background: rgba(247,244,240,0.8); color: var(--text-sub);
    border: none; transition: all 0.15s;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .type-btn.active-expense { background: var(--expense); color: #fff; }
  .type-btn.active-income { background: var(--income); color: #fff; }

  .btn-primary {
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    padding: 13px; font-size: 14px; font-weight: 700;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    cursor: pointer; width: 100%;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

  /* ===== RECORDS LIST ===== */
  .records-list { display: flex; flex-direction: column; gap: 8px; }
  .record-item {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 12px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .record-icon {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .record-icon.expense { background: #FCEAEA; }
  .record-icon.income { background: #E6F4EF; }
  .record-body { flex: 1; min-width: 0; }
  .record-cat { font-size: 11px; color: var(--text-sub); }
  .record-note { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-schedule { font-size: 11px; color: var(--accent); margin-top: 1px; }
  .record-amount { font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .record-amount.expense { color: var(--expense); }
  .record-amount.income { color: var(--income); }
  .record-del { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 14px; padding: 2px 4px; opacity: 0.4; transition: opacity 0.15s; }
  .record-del:hover { opacity: 1; }

  /* ===== CATEGORY BREAKDOWN ===== */
  .cat-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-row { display: flex; flex-direction: column; gap: 4px; }
  .cat-label-row { display: flex; justify-content: space-between; font-size: 13px; }
  .cat-bar-bg { background: var(--accent-light); border-radius: 99px; height: 6px; overflow: hidden; }
  .cat-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s; }
  .cat-avg { font-size: 11px; color: var(--text-sub); }

  /* ===== EMPTY STATE ===== */
  .empty { text-align: center; padding: 36px 20px; color: var(--text-sub); font-size: 13px; }
  .empty-icon { font-size: 30px; margin-bottom: 8px; }

  /* ===== SETTINGS ===== */
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 13px; }
  .settings-input {
    background: rgba(247,244,240,0.8); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-size: 13px; font-family: 'M PLUS Rounded 1c', sans-serif;
    color: var(--text); outline: none; width: 130px; text-align: right;
  }
  .settings-input:focus { border-color: var(--accent); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="header-title">まふゆの<span>家計簿</span></div>
  <div class="bg-picker">
    <label>背景</label>
    <div class="bg-swatch active" data-bg="#F7F4F0" style="background:#F7F4F0;"></div>
    <div class="bg-swatch" data-bg="#EFF3F7" style="background:#EFF3F7;"></div>
    <div class="bg-swatch" data-bg="#F0F5F0" style="background:#F0F5F0;"></div>
    <div class="bg-swatch" data-bg="#F5F0F7" style="background:#F5F0F7;"></div>
    <div class="bg-swatch" data-bg="#2C2825" style="background:#2C2825;"></div>
    <div class="bg-photo-btn active" id="bgPhotoBtn" title="モカの写真">🐱</div>
    <!-- photo input removed -->
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="summary">サマリー</div>
  <div class="tab" data-tab="calendar">カレンダー</div>
  <div class="tab" data-tab="add">追加</div>
  <div class="tab" data-tab="records">記録</div>
  <div class="tab" data-tab="breakdown">カテゴリ</div>
  <div class="tab" data-tab="settings">設定</div>
</div>

<main>

  <!-- SUMMARY -->
  <div class="page active" id="page-summary">
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextMonth">›</button>
    </div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">💰 収入</div>
        <div class="summary-value income" id="totalIncome">¥0</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">💸 支出</div>
        <div class="summary-value expense" id="totalExpense">¥0</div>
      </div>
      <div class="summary-item full">
        <div class="summary-label">🏦 残高</div>
        <div class="summary-value balance" id="totalBalance">¥0</div>
        <div class="goal-section">
          <div class="goal-row"><span>目標貯金額まで</span><span id="goalRemain">―</span></div>
          <div class="goal-bar-bg"><div class="goal-bar-fill" id="goalBarFill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">直近の記録</div>
      <div class="records-list" id="recentList">
        <div class="empty"><div class="empty-icon">📋</div>まだ記録がありません</div>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="page" id="page-calendar">
    <div class="month-nav">
      <button id="prevMonth4">‹</button>
      <div class="month-label" id="monthLabel4"></div>
      <button id="nextMonth4">›</button>
    </div>
    <div class="card">
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="card" id="calDaySummary" style="display:none">
      <div class="card-title" id="calDayTitle"></div>
      <div class="records-list" id="calDayList"></div>
    </div>
  </div>

  <!-- ADD -->
  <div class="page" id="page-add">
    <div class="card">
      <div class="card-title">記録を追加</div>
      <div class="form-grid">
        <div class="form-group">
          <label>種別</label>
          <div class="type-toggle">
            <button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">支出</button>
            <button class="type-btn" id="btnIncome" onclick="setType('income')">収入</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>日付</label>
            <input type="date" id="inputDate">
          </div>
          <div class="form-group">
            <label>金額（円）</label>
            <input type="number" id="inputAmount" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-group" id="categoryGroup">
          <label>カテゴリ</label>
          <select id="inputCategory">
            <option value="食費">🍚 食費</option>
            <option value="外食">🍜 外食</option>
            <option value="日用品">🧴 日用品</option>
            <option value="モカ関連">🐱 モカ関連</option>
            <option value="娯楽">🎵 娯楽</option>
            <option value="生活費">🏠 生活費</option>
            <option value="その他">📦 その他</option>
          </select>
        </div>
        <div class="form-group" id="incomeTypeGroup" style="display:none">
          <label>収入の種類</label>
          <select id="inputIncomeType">
            <option value="給料">💼 給料</option>
            <option value="副収入">💡 副収入</option>
            <option value="その他収入">📥 その他</option>
          </select>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="inputNote" placeholder="例：スーパーで買い物">
        </div>
        <div class="form-group">
          <label>📅 予定・イベント（任意）</label>
          <input type="text" id="inputSchedule" placeholder="例：友達とランチ、給料日">
        </div>
        <button class="btn-primary" onclick="addRecord()">追加する</button>
      </div>
    </div>
  </div>

  <!-- RECORDS -->
  <div class="page" id="page-records">
    <div class="month-nav">
      <button id="prevMonth2">‹</button>
      <div class="month-label" id="monthLabel2"></div>
      <button id="nextMonth2">›</button>
    </div>
    <div class="card">
      <div class="card-title">全記録</div>
      <div class="records-list" id="allRecordsList">
        <div class="empty"><div class="empty-icon">📋</div>まだ記録がありません</div>
      </div>
    </div>
  </div>

  <!-- BREAKDOWN -->
  <div class="page" id="page-breakdown">
    <div class="month-nav">
      <button id="prevMonth3">‹</button>
      <div class="month-label" id="monthLabel3"></div>
      <button id="nextMonth3">›</button>
    </div>
    <div class="card">
      <div class="card-title">カテゴリ別支出</div>
      <div class="cat-list" id="catBreakdown">
        <div class="empty"><div class="empty-icon">📊</div>まだ記録がありません</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">月平均支出（全期間）</div>
      <div class="cat-list" id="catAverage">
        <div class="empty"><div class="empty-icon">📈</div>まだデータが足りません</div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">設定</div>
      <div class="settings-row">
        <div class="settings-label">💰 毎月の収入（目安）</div>
        <input type="number" class="settings-input" id="settingIncome" placeholder="200000">
      </div>
      <div class="settings-row">
        <div class="settings-label">🎯 目標貯金額</div>
        <input type="number" class="settings-input" id="settingGoal" placeholder="100000">
      </div>
      <div class="settings-row">
        <div class="settings-label">📅 締め日</div>
        <select class="settings-input" id="settingCloseDay">
          <option value="end">月末</option>
          <option value="25">25日</option>
          <option value="20">20日</option>
          <option value="15">15日</option>
        </select>
      </div>
    </div>
    <div class="card" style="border-color:rgba(201,123,123,0.4);">
      <div class="card-title" style="color:var(--expense);">⚠ データ管理</div>
      <p style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">データはブラウザに自動保存されます。削除する場合のみ以下を使用してください。</p>
      <button class="btn-primary" style="background:var(--expense);" onclick="clearAll()">すべて削除する</button>
    </div>
  </div>

</main>

<!-- DAY DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="records-list" id="modalRecordsList"></div>
  </div>

// ===== STATE =====
let records = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentType = 'expense';
let settings = { income: 0, goal: 0, closeDay: 'end' };
let bgImageDataURL = null;

const CATEGORIES = ['食費','外食','日用品','モカ関連','娯楽','生活費','その他'];
const CAT_ICONS = { '食費':'🍚','外食':'🍜','日用品':'🧴','モカ関連':'🐱','娯楽':'🎵','生活費':'🏠','給料':'💼','副収入':'💡','その他収入':'📥','その他':'📦' };

// ===== LOCAL STORAGE =====
function saveData() {
  try {
    localStorage.setItem('mafuyu_records', JSON.stringify(records));
    localStorage.setItem('mafuyu_settings', JSON.stringify(settings));
    if (bgImageDataURL) {
      // store only if small enough (< 2MB)
      if (bgImageDataURL.length < 2000000) {
        localStorage.setItem('mafuyu_bg', bgImageDataURL);
      }
    } else {
      localStorage.removeItem('mafuyu_bg');
    }
  } catch(e) { console.warn('Save failed', e); }
}

function loadData() {
  try {
    const r = localStorage.getItem('mafuyu_records');
    if (r) records = JSON.parse(r);
    const s = localStorage.getItem('mafuyu_settings');
    if (s) {
      settings = { ...settings, ...JSON.parse(s) };
      const si = document.getElementById('settingIncome');
      const sg = document.getElementById('settingGoal');
      const sc = document.getElementById('settingCloseDay');
      if (settings.income) si.value = settings.income;
      if (settings.goal) sg.value = settings.goal;
      if (settings.closeDay) sc.value = settings.closeDay;
    }
    const bg = localStorage.getItem('mafuyu_bg');
    if (bg) {
      bgImageDataURL = bg;
      applyBgImage(bg);
      document.getElementById('bgPhotoBtn').classList.add('active');
    }
  } catch(e) { console.warn('Load failed', e); }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('page-' + t.dataset.tab).classList.add('active');
      renderAll();
    });
  });

  // Month navs
  [['prevMonth','nextMonth'],['prevMonth2','nextMonth2'],['prevMonth3','nextMonth3'],['prevMonth4','nextMonth4']].forEach(([p,n]) => {
    document.getElementById(p).onclick = () => changeMonth(-1);
    document.getElementById(n).onclick = () => changeMonth(1);
  });

  // Color swatches
  document.querySelectorAll('.bg-swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
      document.getElementById('bgPhotoBtn').classList.remove('active');
      s.classList.add('active');
      bgImageDataURL = null;
      document.body.classList.remove('has-bg-image');
      document.body.style.backgroundImage = '';
      const bg = s.dataset.bg;
      document.body.style.background = bg;
      document.documentElement.style.setProperty('--bg', bg);
      if (bg === '#2C2825') {
        document.documentElement.style.setProperty('--surface', 'rgba(58,53,50,0.92)');
        document.documentElement.style.setProperty('--surface-solid', '#3A3532');
        document.documentElement.style.setProperty('--border', 'rgba(80,70,64,0.6)');
        document.documentElement.style.setProperty('--text', '#F0EBE4');
        document.documentElement.style.setProperty('--text-sub', '#A09890');
      } else {
        document.documentElement.style.setProperty('--surface', 'rgba(255,255,255,0.88)');
        document.documentElement.style.setProperty('--surface-solid', '#FFFFFF');
        document.documentElement.style.setProperty('--border', 'rgba(200,190,180,0.5)');
        document.documentElement.style.setProperty('--text', '#2C2825');
        document.documentElement.style.setProperty('--text-sub', '#8A837C');
      }
      saveData();
    });
  });

  // Photo bg button
  // Moka photo cycling
  let mokaInterval = null;
  let mokaIndex = 0;

  document.getElementById('bgPhotoBtn').addEventListener('click', () => {
    const btn = document.getElementById('bgPhotoBtn');
    if (btn.classList.contains('active')) {
      // turn off
      btn.classList.remove('active');
      if (mokaInterval) { clearInterval(mokaInterval); mokaInterval = null; }
      bgImageDataURL = null;
      document.body.classList.remove('has-bg-image');
      document.body.style.backgroundImage = '';
      document.body.style.background = 'var(--bg)';
      saveData();
      return;
    }
    // turn on
    document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    mokaIndex = Math.floor(Math.random() * MOKA_PHOTOS.length);
    applyBgImage(MOKA_PHOTOS[mokaIndex]);
    bgImageDataURL = MOKA_PHOTOS[mokaIndex];
    saveData();
    if (mokaInterval) clearInterval(mokaInterval);
    mokaInterval = setInterval(() => {
      mokaIndex = (mokaIndex + 1) % MOKA_PHOTOS.length;
      applyBgImage(MOKA_PHOTOS[mokaIndex]);
      bgImageDataURL = MOKA_PHOTOS[mokaIndex];
    }, 5000);
  });

  // Settings
  document.getElementById('settingIncome').addEventListener('input', e => { settings.income = parseInt(e.target.value)||0; saveData(); renderAll(); });
  document.getElementById('settingGoal').addEventListener('input', e => { settings.goal = parseInt(e.target.value)||0; saveData(); renderAll(); });
  document.getElementById('settingCloseDay').addEventListener('change', e => { settings.closeDay = e.target.value; saveData(); renderAll(); });

  renderAll();
});

function applyBgImage(url) {
  document.body.classList.add('has-bg-image');
  document.body.style.backgroundImage = `url(${url})`;
  document.body.style.background = '';
  // very transparent so moka shows through
  document.documentElement.style.setProperty('--surface', 'rgba(255,255,255,0.45)');
  document.documentElement.style.setProperty('--surface-solid', 'rgba(255,255,255,0.55)');
  document.documentElement.style.setProperty('--border', 'rgba(200,190,180,0.3)');
  document.documentElement.style.setProperty('--text', '#1A1410');
  document.documentElement.style.setProperty('--text-sub', '#4A423C');
  document.documentElement.style.setProperty('--shadow', '0 2px 14px rgba(44,40,37,0.18)');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderAll();
}

function setType(t) {
  currentType = t;
  document.getElementById('btnExpense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  document.getElementById('btnIncome').className = 'type-btn' + (t==='income' ? ' active-income' : '');
  document.getElementById('categoryGroup').style.display = t==='expense' ? '' : 'none';
  document.getElementById('incomeTypeGroup').style.display = t==='income' ? '' : 'none';
}

function addRecord() {
  const date = document.getElementById('inputDate').value;
  const amount = parseInt(document.getElementById('inputAmount').value)||0;
  const note = document.getElementById('inputNote').value.trim();
  const schedule = document.getElementById('inputSchedule').value.trim();
  const category = currentType==='expense'
    ? document.getElementById('inputCategory').value
    : document.getElementById('inputIncomeType').value;
  if (!date||!amount) { alert('日付と金額を入力してください'); return; }
  records.push({ id: Date.now(), date, amount, note, schedule, category, type: currentType });
  records.sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('inputAmount').value='';
  document.getElementById('inputNote').value='';
  document.getElementById('inputSchedule').value='';
  document.getElementById('inputDate').value=new Date().toISOString().split('T')[0];
  saveData();
  renderAll();
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-tab="summary"]').classList.add('active');
  document.getElementById('page-summary').classList.add('active');
}

function deleteRecord(id) {
  records = records.filter(r=>r.id!==id);
  saveData(); renderAll();
}

function clearAll() {
  if (confirm('すべての記録を削除しますか？')) {
    records=[];
    saveData(); renderAll();
  }
}

// ===== RENDER =====
function renderAll() {
  updateMonthLabels();
  renderSummary();
  renderCalendar();
  renderRecords();
  renderBreakdown();
}

function updateMonthLabels() {
  const label = `${currentYear}年${currentMonth+1}月`;
  ['monthLabel','monthLabel2','monthLabel3','monthLabel4'].forEach(id => {
    document.getElementById(id).textContent = label;
  });
}

function getMonthRecords() {
  return records.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear()===currentYear && d.getMonth()===currentMonth;
  });
}

function fmt(n) { return '¥'+n.toLocaleString(); }

function renderSummary() {
  const mr = getMonthRecords();
  const income = mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const expense = mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const balance = income - expense;
  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);
  document.getElementById('totalBalance').textContent = fmt(balance);
  const goal = settings.goal;
  if (goal>0) {
    const pct = Math.min(100, Math.round((balance/goal)*100));
    const fill = document.getElementById('goalBarFill');
    fill.style.width = Math.max(0,pct)+'%';
    fill.className = 'goal-bar-fill'+(pct>=100?' over':'');
    document.getElementById('goalRemain').textContent = balance>=goal ? '達成！🎉' : fmt(goal-balance)+' 不足';
  } else {
    document.getElementById('goalRemain').textContent='目標未設定';
    document.getElementById('goalBarFill').style.width='0%';
  }
  const recent = mr.slice(0,5);
  const el = document.getElementById('recentList');
  el.innerHTML = recent.length ? recent.map(r=>recordHTML(r)).join('') :
    '<div class="empty"><div class="empty-icon">📋</div>この月の記録はありません</div>';
}

// ===== CALENDAR =====
function renderCalendar() {
  const mr = getMonthRecords();
  // build day totals
  const dayExpense = {}, dayIncome = {}, daySchedule = {};
  mr.forEach(r => {
    const d = parseInt(r.date.slice(8));
    if (r.type==='expense') dayExpense[d] = (dayExpense[d]||0)+r.amount;
    else dayIncome[d] = (dayIncome[d]||0)+r.amount;
    if (r.schedule) daySchedule[d] = r.schedule;
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===currentYear && today.getMonth()===currentMonth;

  const headers = ['日','月','火','水','木','金','土'];
  let html = headers.map((h,i) =>
    `<div class="cal-header${i===0?' sun':i===6?' sat':''}">${h}</div>`
  ).join('');

  // empty cells
  for (let i=0; i<firstDay; i++) html += '<div class="cal-cell empty"></div>';

  for (let d=1; d<=daysInMonth; d++) {
    const dow = (firstDay+d-1)%7;
    const isToday = isCurrentMonth && today.getDate()===d;
    const exp = dayExpense[d];
    const inc = dayIncome[d];
    const sched = daySchedule[d];
    const dayClass = dow===0?' sun':dow===6?' sat':'';
    html += `<div class="cal-cell${isToday?' today':''}" onclick="showDayDetail(${d})">
      <div class="cal-day${dayClass}">${d}</div>
      ${exp ? `<div class="cal-expense">${exp>=10000?'¥'+(exp/10000).toFixed(1)+'万':'¥'+exp.toLocaleString()}</div>` : ''}
      ${inc ? `<div class="cal-income">+${inc>=10000?'¥'+(inc/10000).toFixed(1)+'万':'¥'+inc.toLocaleString()}</div>` : ''}
      ${sched ? `<div class="cal-dot"></div>` : ''}
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('calDaySummary').style.display = 'none';
}

function showDayDetail(day) {
  const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const dayRecords = records.filter(r=>r.date===dateStr);
  if (!dayRecords.length) return;
  const title = `${currentMonth+1}月${day}日`;
  document.getElementById('calDayTitle').textContent = title;
  document.getElementById('calDayList').innerHTML = dayRecords.map(r=>recordHTML(r,true)).join('');
  document.getElementById('calDaySummary').style.display = '';
  document.getElementById('calDaySummary').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function renderRecords() {
  const mr = getMonthRecords();
  const el = document.getElementById('allRecordsList');
  el.innerHTML = mr.length ? mr.map(r=>recordHTML(r,true)).join('') :
    '<div class="empty"><div class="empty-icon">📋</div>この月の記録はありません</div>';
}

function recordHTML(r, showDel=false) {
  const icon = CAT_ICONS[r.category]||'📦';
  const amtSign = r.type==='income' ? '+' : '-';
  const dateStr = r.date.slice(5).replace('-','/');
  return `<div class="record-item">
    <div class="record-icon ${r.type}">${icon}</div>
    <div class="record-body">
      <div class="record-cat">${r.category} · <span>${dateStr}</span></div>
      <div class="record-note">${r.note||'（メモなし）'}</div>
      ${r.schedule ? `<div class="record-schedule">📅 ${r.schedule}</div>` : ''}
    </div>
    <div class="record-amount ${r.type}">${amtSign}${fmt(r.amount)}</div>
    ${showDel ? `<button class="record-del" onclick="deleteRecord(${r.id})">✕</button>` : ''}
  </div>`;
}

function renderBreakdown() {
  const mr = getMonthRecords().filter(r=>r.type==='expense');
  const total = mr.reduce((s,r)=>s+r.amount,0);
  const bycat = {};
  CATEGORIES.forEach(c=>bycat[c]=0);
  mr.forEach(r=>{ if(bycat[r.category]!==undefined) bycat[r.category]+=r.amount; else bycat['その他']+=r.amount; });
  const el = document.getElementById('catBreakdown');
  if (!total) {
    el.innerHTML='<div class="empty"><div class="empty-icon">📊</div>この月の支出はありません</div>';
  } else {
    el.innerHTML = CATEGORIES.map(c=>{
      const amt=bycat[c]; if(!amt) return '';
      const pct=Math.round((amt/total)*100);
      return `<div class="cat-row">
        <div class="cat-label-row"><span>${CAT_ICONS[c]} ${c}</span><span>${fmt(amt)} (${pct}%)</span></div>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }
  const allExp = records.filter(r=>r.type==='expense');
  if (!allExp.length) {
    document.getElementById('catAverage').innerHTML='<div class="empty"><div class="empty-icon">📈</div>まだデータが足りません</div>';
    return;
  }
  const months = new Set(allExp.map(r=>r.date.slice(0,7))).size||1;
  const avgBycat={};
  CATEGORIES.forEach(c=>avgBycat[c]=0);
  allExp.forEach(r=>{ if(avgBycat[r.category]!==undefined) avgBycat[r.category]+=r.amount; else avgBycat['その他']+=r.amount; });
  const maxAvg = Math.max(...Object.values(avgBycat));
  document.getElementById('catAverage').innerHTML = CATEGORIES.map(c=>{
    const avg=Math.round(avgBycat[c]/months); if(!avg) return '';
    const pct=maxAvg>0?Math.round((avg/maxAvg)*100):0;
    return `<div class="cat-row">
      <div class="cat-label-row"><span>${CAT_ICONS[c]} ${c}</span><span class="cat-avg">月平均 ${fmt(avg)}</span></div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }
</script>
